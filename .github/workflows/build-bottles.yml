name: Build bottles

# Only build bottles when a formula actually changes; this avoids the `merge`
# job failing on PRs that touch no formulae (no bottles -> no artifacts).
on:
  pull_request:
    paths:
      - Formula/**

env:
  HOMEBREW_NO_ANALYTICS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  build-bottles:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [macos-26, macos-15, macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      HOMEBREW_FORCE_VENDOR_RUBY: 1
    steps:
      - name: Activate Homebrew
        if: runner.os == 'Linux'
        run: echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Remove pre-installed external taps
        # The GitHub runner images ship the aws/tap and azure/bicep taps, which
        # are irrelevant to this tap. They were previously trusted to satisfy
        # brew's tap-trust requirement, but `brew trust` now fails on Linux with
        # "Unexpected platform!", breaking every PR's ubuntu-latest job. Untap
        # them instead so the trust check has nothing to flag.
        run: brew untap --force aws/tap azure/bicep 2>/dev/null || true

      - name: Cache Homebrew Bundler RubyGems
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        if: steps.cache.outputs.cache-hit != 'true'
        run: brew install-bundler-gems

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-tap-syntax

      - run: |
          brew test-bot --only-formulae --only-json-tab --skip-recursive-dependents --root-url="https://ghcr.io/v2/brewsci/bio"
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: bottles-${{ matrix.os }}
          path: '*.bottle.*'

  merge:
    runs-on: ubuntu-latest
    needs: build-bottles
    steps:
      - name: Merge Artifacts
        # Tolerate PRs that change no formula (e.g. workflow-only changes):
        # no bottles are built, so there is nothing to merge and the action
        # would otherwise error on an empty `bottles-*` pattern.
        continue-on-error: true
        uses: actions/upload-artifact/merge@v6
        with:
          name: all-bottles
          pattern: bottles-*
